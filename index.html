<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tapsi</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/font.css">
</head>
<body>
    <section class="contact-us container">
        <div class="contact-us__icons">
            <div class="icon-holder">
                <span class="icon-holder__label">domanloom@gmil.com</span>
                <span class="icon-container">
                    <svg class="icon">
                        <use xlink:href="./assets/image/svg-sprite.svg#email-open"></use>
                    </svg>
                </span>
            </div>
            <div class="icon-holder">
                <span class="icon-holder__label">09925438078</span>
                <span class="icon-container">
                    <svg class="icon">
                        <use xlink:href="./assets/image/svg-sprite.svg#call"></use>
                    </svg>
                </span>
            </div>
            <div class="icon-holder">
                <span class="icon-holder__label">تهران - پیروزی - چهارصددستگاه - خیابان قانون - خیابان مصطفی نظری - کوچه ترانه</span>
                <span class="icon-container">   
                    <svg class="icon">
                        <use xlink:href="./assets/image/svg-sprite.svg#location-on"></use>
                    </svg>
                </span>
            </div>
        </div>
    
        <div class="contact-us__map" style="background-color: blueviolet;">map</div>

        <div class="contact-us__social">
            <div class="icon-holder">
                <span class="icon-container">
                    <svg class="icon">
                        <use xlink:href="./assets/image/svg-sprite.svg#telegram-plane"></use>
                    </svg>
                </span>
            </div>
            <div class="icon-holder">
                <span class="icon-container">
                    <svg class="icon">
                        <use xlink:href="./assets/image/svg-sprite.svg#linkedin"></use>
                    </svg>
                </span>
            </div>
            <div class="icon-holder">
                <span class="icon-container">
                    <svg class="icon">
                        <use xlink:href="./assets/image/svg-sprite.svg#twitter"></use>
                    </svg>
                </span>
            </div>
        </div>
        
        <div class="contact-us__form" style="background-color: aqua;">form</div>
        
    </section>

</html>
